spring:
  application:
    name: saas-core
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:saas_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:saas_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:saas_password}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
app:
  security:
    jwt:
      secret: VmVyeVNlY3JldEtleUZvckpXVFNpZ25pbmdUaGF0TXVzdEJlQXRMZWFzdDI1NkJpdHM=
      expiration-ms: 86400000
